services:
  - type: cron
    name: fiskars-auto
    runtime: python
    plan: starter
    schedule: "0 7 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python3 run_all.py"

  - type: cron
    name: fiskars-foxtrot
    runtime: python
    plan: starter
    schedule: "2 7 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python3 send_foxtrot_file.py"